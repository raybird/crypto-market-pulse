<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Market Pulse - 加密市場脈動</title>
    <style>
        :root {
            --primary: #00d4ff;
            --bg: #050507;
            --card-bg: #111114;
            --text: #ffffff;
            --negative: #ff453a;
            --positive: #32d74b;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0; padding: 1.2rem;
        }
        .container { max-width: 500px; margin: 0 auto; }
        header { border-bottom: 1px solid #222; padding-bottom: 1rem; margin-bottom: 1.5rem; text-align: center; }
        h1 { color: var(--primary); font-size: 1.4rem; margin: 0; letter-spacing: 1px; }
        .timestamp { font-size: 0.7rem; color: #666; margin-top: 4px; }
        
        .price-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid #222;
        }
        .symbol { color: #888; font-weight: 600; font-size: 0.9rem; }
        .price { font-size: 2.2rem; font-weight: 800; margin: 0.5rem 0; }
        .change { font-weight: 700; font-size: 1rem; padding: 4px 10px; border-radius: 8px; display: inline-block; }
        
        .news-section { margin-top: 2rem; }
        .news-item {
            background: #16161a;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 0.8rem;
            font-size: 0.9rem;
            line-height: 1.4;
            border-left: 3px solid var(--primary);
        }
        footer { text-align: center; color: #444; font-size: 0.7rem; margin-top: 3rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>CRYPTO MARKET PULSE</h1>
            <p class="timestamp">由 TeleNexus 自動監控 | 更新於：2026-03-08 09:00 (Taipei)</p>
        </header>

        <div class="price-card">
            <div class="symbol">BTC/USDT (Binance)</div>
            <div class="price">$67,177.81</div>
            <div class="change" style="background: rgba(255, 69, 58, 0.15); color: var(--negative);">-0.11% (6H)</div>
        </div>

        <div class="news-section">
            <div style="font-size: 0.8rem; font-weight: 700; color: #888; margin-bottom: 1rem; text-transform: uppercase;">Latest Insights</div>
            <div class="news-item">
                市場行情進入週末典型低波動期。雖然 BTC 在清晨遭遇小幅拋壓，但關鍵支撐位 $67k 仍維持穩健。
            </div>
            <div class="news-item">
                Kalshi 法律爭議持續發酵，投資者正密切關注預測市場的合規化進程對鏈上流動性的長期影響。
            </div>
        </div>

        <footer>
            &copy; 2026 Raybird. 所有市場數據由 TeleNexus AI 實時抓取與分析。
        </footer>
    </div>
</body>
</html>
