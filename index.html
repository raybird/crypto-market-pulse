<!DOCTYPE html>
<html lang="zh-TW" data-size="medium">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Market Pulse - 加密市場脈動</title>
    <style>
        :root {
            --primary: #00d4ff;
            --bg: #050507;
            --card-bg: #111114;
            --text: #ffffff;
            --negative: #ff453a;
            --positive: #32d74b;
        }
        /* 字體切換 */
        html[data-size="small"] { font-size: 14px; }
        html[data-size="medium"] { font-size: 16px; }
        html[data-size="large"] { font-size: 20px; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 1rem;
            line-height: 1.5;
            transition: font-size 0.2s ease;
        }
        .container { max-width: 500px; margin: 0 auto; }
        header { 
            border-bottom: 1px solid #222; 
            padding-bottom: 1rem; 
            margin-bottom: 1.5rem; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 { color: var(--primary); font-size: 1.1rem; margin: 0; letter-spacing: 1px; }

        .font-switcher {
            display: flex; gap: 5px; background: #111; padding: 3px; border-radius: 6px; border: 1px solid #222;
        }
        .font-btn {
            background: none; border: none; color: #444; padding: 2px 8px; cursor: pointer; border-radius: 4px; font-size: 0.75rem; font-weight: bold;
        }
        .font-btn.active { background: var(--primary); color: #000; }

        .timestamp { font-size: 0.7rem; color: #666; margin-top: 4px; text-align: center; }
        .price-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid #222;
        }
        .symbol { color: #888; font-weight: 600; font-size: 0.9rem; }
        .price { font-size: 2.2rem; font-weight: 800; margin: 0.5rem 0; }
        .change { font-weight: 700; font-size: 1rem; padding: 4px 10px; border-radius: 8px; display: inline-block; }
        
        .news-item {
            background: #16161a;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 0.8rem;
            font-size: 0.9rem;
            line-height: 1.4;
            border-left: 3px solid var(--primary);
        }
        footer { text-align: center; color: #444; font-size: 0.7rem; margin-top: 3rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>MARKET PULSE</h1>
            <div class="font-switcher">
                <button class="font-btn" onclick="setFontSize('small')" id="btn-small">S</button>
                <button class="font-btn active" onclick="setFontSize('medium')" id="btn-medium">M</button>
                <button class="font-btn" onclick="setFontSize('large')" id="btn-large">L</button>
            </div>
        </header>

        <p class="timestamp">更新於：2026-03-08 15:00 (Taipei)</p>

        <div class="price-card">
            <div class="symbol">BTC/USDT</div>
            <div class="price">$67,161.46</div>
            <div class="change" style="background: rgba(255, 69, 58, 0.15); color: var(--negative);">-0.13%</div>
        </div>

        <div class="news-item">市場行情持續盤整。最新新聞顯示加密貨幣領域今日動態平穩，比特幣價格在 $67k 區間展現韌性，波動幅度顯著縮減。</div>

        <footer>
            &copy; 2026 Raybird. 所有市場數據由 TeleNexus AI 實時抓取。
        </footer>
    </div>

    <script>
        function setFontSize(size) {
            document.documentElement.setAttribute('data-size', size);
            localStorage.setItem('pulse-font-size', size);
            document.querySelectorAll('.font-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + size).classList.add('active');
        }
        const savedSize = localStorage.getItem('pulse-font-size') || 'medium';
        setFontSize(savedSize);
    </script>
</body>
</html>
