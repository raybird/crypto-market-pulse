<!DOCTYPE html>
<html lang="zh-TW" data-size="medium">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Market Pulse - 三時段專業市場報告</title>
    <style>
        :root {
            --primary: #00d4ff;
            --bg: #050507;
            --card-bg: #111114;
            --text: #ffffff;
            --negative: #ff453a;
            --edition-bg: #1a1a1e;
        }
        html[data-size="small"] { font-size: 14px; }
        html[data-size="medium"] { font-size: 16px; }
        html[data-size="large"] { font-size: 20px; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 1rem; line-height: 1.5; transition: font-size 0.2s ease;
        }
        .container { max-width: 500px; margin: 0 auto; }
        header { 
            border-bottom: 1px solid #222; padding-bottom: 1rem; margin-bottom: 1.2rem; 
            display: flex; justify-content: space-between; align-items: center;
        }
        h1 { color: var(--primary); font-size: 1.1rem; margin: 0; letter-spacing: 1px; }
        .font-switcher { display: flex; gap: 5px; background: #111; padding: 3px; border-radius: 6px; border: 1px solid #222; }
        .font-btn { background: none; border: none; color: #444; padding: 2px 8px; cursor: pointer; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .font-btn.active { background: var(--primary); color: #000; }

        /* 專報標籤 */
        .edition-badge {
            background: var(--primary);
            color: #000;
            display: inline-block;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 800;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .timestamp { font-size: 0.7rem; color: #666; margin-bottom: 1rem; text-align: center; }
        
        .price-card {
            background: var(--card-bg); border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #222;
        }
        .symbol { color: #888; font-weight: 600; font-size: 0.9rem; }
        .price { font-size: 2.2rem; font-weight: 800; margin: 0.5rem 0; }
        .change { font-weight: 700; font-size: 1rem; padding: 4px 10px; border-radius: 8px; display: inline-block; }
        
        .news-item {
            background: #16161a; padding: 1rem; border-radius: 12px; margin-bottom: 0.8rem;
            font-size: 0.9rem; line-height: 1.4; border-left: 3px solid var(--primary);
        }
        footer { text-align: center; color: #444; font-size: 0.7rem; margin-top: 3rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>MARKET PULSE</h1>
            <div class="font-switcher">
                <button class="font-btn" onclick="setFontSize('small')" id="btn-small">S</button>
                <button class="font-btn active" onclick="setFontSize('medium')" id="btn-medium">M</button>
                <button class="font-btn" onclick="setFontSize('large')" id="btn-large">L</button>
            </div>
        </header>

        <div style="text-align: center;">
            <div class="edition-badge" id="edition-title">整點市場快訊</div>
            <p class="timestamp" id="last-update">最後更新：2026-03-08 18:00 (Taipei)</p>
        </div>

        <div class="price-card">
            <div class="symbol">BTC/USDT</div>
            <div class="price">$67,724.41</div>
            <div class="change" style="background: rgba(50, 215, 75, 0.15); color: #32d74b;">+0.71%</div>
        </div>

        <div id="report-content">
            <div class="news-item">市場多頭力道增強，比特幣價格穩步攀升至 $67.7k 區間。隨著法律不確定性的消退，資金正加速回流現貨市場，短期內展現出強勁的修復動能。</div>
        </div>

        <footer>
            &copy; 2026 Raybird. 三時段專報系統由 TeleNexus AI 驅動。
        </footer>
    </div>

    <script>
        function setFontSize(size) {
            document.documentElement.setAttribute('data-size', size);
            localStorage.setItem('pulse-font-size', size);
            document.querySelectorAll('.font-btn').forEach(btn => btn.classList.remove('active'));
            const btn = document.getElementById('btn-' + size);
            if(btn) btn.classList.add('active');
        }
        const savedSize = localStorage.getItem('pulse-font-size') || 'medium';
        setFontSize(savedSize);

        // 動態設定專報標題 (模擬下一次自動更新後的顯示)
        function updateEdition() {
            const hour = new Date().getHours();
            let title = "整點市場快訊";
            if (hour >= 6 && hour < 11) title = "晨間開盤報";
            else if (hour >= 11 && hour < 14) title = "午間觀察報";
            else if (hour >= 20 && hour < 23) title = "晚間總結報";
            document.getElementById('edition-title').innerText = title;
        }
        updateEdition();
    </script>
</body>
</html>
